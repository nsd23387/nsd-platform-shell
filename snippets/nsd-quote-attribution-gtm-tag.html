<script>
/**
 * NSD Quote Attribution — GTM Custom HTML Tag (v2)
 *
 * Trigger: Custom Event — custom-neon-quote_submit
 *
 * Captures:
 *   - origin_page (SEO landing page attribution)
 *   - utm_source, utm_medium, utm_campaign, utm_content, utm_term (channel attribution)
 *   - gclid (Google Ads click-level attribution, from URL or _gcl_aw cookie)
 *   - referrer, visitor_id, session_id
 *
 * UTM parameters are persisted in sessionStorage on first landing so they
 * survive navigation across pages before the quote form is submitted.
 *
 * Sends conversion event to the NSD Sales Engine ingestion endpoint.
 */
(function () {
  var INGEST_URL = 'https://analytics.neonsignsdepot.com/api/ingest/web-event';
  var UTM_STORAGE_KEY = '_nsd_utm';

  function getParam(name) {
    try {
      var url = new URL(window.location.href);
      return url.searchParams.get(name) || null;
    } catch (e) {
      return null;
    }
  }

  function getCookie(name) {
    try {
      var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    } catch (e) {
      return null;
    }
  }

  function getGclid() {
    var gclid = getParam('gclid');
    if (gclid) return gclid;
    try {
      var gclAw = getCookie('_gcl_aw');
      if (gclAw) {
        var parts = gclAw.split('.');
        return parts.length >= 3 ? parts[2] : null;
      }
    } catch (e) {}
    return null;
  }

  function captureAndPersistUtm() {
    var stored = null;
    try {
      stored = JSON.parse(sessionStorage.getItem(UTM_STORAGE_KEY));
    } catch (e) {}

    var freshSource = getParam('utm_source');
    if (freshSource) {
      var utm = {
        utm_source: freshSource,
        utm_medium: getParam('utm_medium'),
        utm_campaign: getParam('utm_campaign'),
        utm_content: getParam('utm_content'),
        utm_term: getParam('utm_term'),
        gclid: getGclid(),
        landing_page: window.location.href
      };
      try { sessionStorage.setItem(UTM_STORAGE_KEY, JSON.stringify(utm)); } catch (e) {}
      return utm;
    }

    if (stored && stored.utm_source) return stored;

    var gclid = getGclid();
    if (gclid) {
      var gclidUtm = {
        utm_source: 'google',
        utm_medium: 'cpc',
        utm_campaign: null,
        utm_content: null,
        utm_term: null,
        gclid: gclid,
        landing_page: window.location.href
      };
      try { sessionStorage.setItem(UTM_STORAGE_KEY, JSON.stringify(gclidUtm)); } catch (e) {}
      return gclidUtm;
    }

    return stored || {};
  }

  function getSessionId() {
    var key = '_nsd_sid';
    var sid = sessionStorage.getItem(key);
    if (!sid) {
      sid = 'ses_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem(key, sid);
    }
    return sid;
  }

  function getVisitorId() {
    var key = '_nsd_vid';
    var vid = localStorage.getItem(key);
    if (!vid) {
      vid = 'vis_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
      localStorage.setItem(key, vid);
    }
    return vid;
  }

  var quoteId = null;
  var quoteType = null;
  var quoteValue = 0;
  var isFreeCampaign = false;

  try {
    var gtmId = Object.keys(window.google_tag_manager || {}).filter(function(k) {
      return k.indexOf('GTM-') === 0;
    })[0];
    if (gtmId && window.google_tag_manager[gtmId] && window.google_tag_manager[gtmId].dataLayer) {
      var dlModel = window.google_tag_manager[gtmId].dataLayer;
      quoteId = dlModel.get('quote_id') || null;
      quoteType = dlModel.get('quote_type') || null;
      quoteValue = dlModel.get('quote_value') || 0;
      isFreeCampaign = dlModel.get('is_free_campaign') || false;
    }
  } catch (e) {}

  if (!quoteId) {
    var dl = window.dataLayer || [];
    for (var i = dl.length - 1; i >= 0; i--) {
      if (dl[i] && dl[i].event === 'custom-neon-quote_submit') {
        quoteId = dl[i].quote_id || null;
        quoteType = dl[i].quote_type || null;
        quoteValue = dl[i].quote_value || 0;
        isFreeCampaign = dl[i].is_free_campaign || false;
        break;
      }
    }
  }

  var originPage = getParam('origin_page');
  var utm = captureAndPersistUtm();

  var payload = {
    event_type: 'conversion',
    page_url: window.location.origin + window.location.pathname,
    visitor_id: getVisitorId(),
    session_id: getSessionId(),
    origin_page: originPage,
    referrer: document.referrer || null,
    user_agent: navigator.userAgent,
    source: utm.utm_source || null,
    event_data: {
      quote_id: quoteId,
      quote_type: quoteType,
      preliminary_price: Math.round((quoteValue || 0) * 100),
      product_category: quoteType || 'Unknown',
      submission_source: 'quote.neonsignsdepot.com',
      is_free_campaign: isFreeCampaign,
      utm_source: utm.utm_source || null,
      utm_medium: utm.utm_medium || null,
      utm_campaign: utm.utm_campaign || null,
      utm_content: utm.utm_content || null,
      utm_term: utm.utm_term || null,
      gclid: utm.gclid || null,
      landing_page: utm.landing_page || null
    }
  };

  var xhr = new XMLHttpRequest();
  xhr.open('POST', INGEST_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onerror = function() {
    if (window.console) console.warn('[NSD Attribution] XHR failed');
  };
  xhr.send(JSON.stringify(payload));
})();
</script>
